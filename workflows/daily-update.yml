name: Daily Data Update

on:
  schedule:
    # Each trading day Mon-Fri at 18:00 Beijing time (10:00 UTC)
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Force update even if data is fresh"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main (for scripts)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo

      - name: Checkout gh-pages (for data)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-data

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Sync scripts to gh-pages
        run: |
          mkdir -p gh-pages-data/scripts
          mkdir -p gh-pages-data/task04_turtle_strategy/data
          cp main-repo/scripts/*.py gh-pages-data/scripts/
          cp main-repo/task04_turtle_strategy/build_tool_html.py gh-pages-data/task04_turtle_strategy/

      - name: Run daily update
        working-directory: gh-pages-data
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/daily_update.py

      - name: Commit and push to gh-pages
        working-directory: gh-pages-data
        env:
          CI_COMMIT_MESSAGE: "data: auto-update ${{ github.event.repository.updated_at}}"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: auto-update $(date +%Y-%m-%d)"
            git push
          fi
