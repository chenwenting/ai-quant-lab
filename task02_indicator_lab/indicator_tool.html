<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndicatorLab — 技术指标交互分析工具</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
:root {
  --up:#e74c3c;--down:#27ae60;--bg:#f5f6fa;--card:#fff;--text:#1a1a2e;--sub:#6c757d;
  --border:#e8eaed;--accent:#4361ee;
  --macd-c:#3498db;--bb-c:#9b59b6;--rsi-c:#e67e22;--atr-c:#27ae60;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Microsoft YaHei","SimHei",sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Top bar */
.top-bar{height:40px;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;display:flex;align-items:center;padding:0 14px;font-size:13px;gap:10px;flex-shrink:0;z-index:10}
.top-bar .brand{font-weight:700;font-size:15px}
.top-bar .brand span{color:var(--accent)}
.top-bar .sep{color:rgba(255,255,255,.2)}
.top-bar .tag{background:rgba(255,255,255,.1);padding:2px 9px;border-radius:9px;font-size:11px}
.stock-row{display:flex;gap:5px;margin-left:8px}
.stock-btn{padding:4px 10px;border:1px solid rgba(255,255,255,.25);border-radius:5px;background:transparent;color:#fff;cursor:pointer;font-size:11px;transition:.15s}
.stock-btn:hover{background:rgba(255,255,255,.15)}
.stock-btn.active{background:var(--accent);border-color:var(--accent)}
.upload-top{font-size:11px;color:rgba(255,255,255,.6);cursor:pointer;margin-left:auto;padding:4px 10px;border:1px dashed rgba(255,255,255,.3);border-radius:5px;transition:.15s}
.upload-top:hover{color:#fff;border-color:rgba(255,255,255,.6)}
.upload-top.loaded{color:#27ae60;border-color:#27ae60;border-style:solid}

/* Stock info card */
.info-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin:0 8px 8px;padding:12px 16px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.info-card .item{display:flex;flex-direction:column;gap:2px}
.info-card .item .label{font-size:11px;color:var(--sub)}
.info-card .item .val{font-size:18px;font-weight:700;color:var(--text)}
.info-card .item .val.up{color:var(--up)}
.info-card .item .val.down{color:var(--down)}
.info-card .item .sub{font-size:11px;color:var(--sub)}
.info-card .range{font-size:12px;color:var(--sub);margin-left:auto}

/* Main scroll area */
.main{flex:1;overflow-y:auto;padding:8px;padding-top:0}

/* Indicator row */
.ind-row{display:flex;gap:8px;margin-bottom:8px;min-height:300px}
.ind-row:last-child{margin-bottom:0}

/* Config panel (left side of each row) */
.config{width:280px;min-width:280px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;flex-direction:column;gap:6px}
.config .ch{cursor:pointer;user-select:none}
.config .ch .hd{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:700;margin-bottom:6px}
.config .ch .hd .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.config .ch .hd .arrow{font-size:10px;color:var(--sub);margin-left:auto;transition:.2s}
.config .ch .body{display:block}
.config .ch.collapsed .body{display:none}
.config .ch.collapsed .arrow{transform:rotate(-90deg)}
.p-row{display:flex;align-items:center;margin-top:5px;font-size:12px}
.p-row label{width:48px;color:var(--sub);flex-shrink:0;font-size:12px}
.p-row input[type=range]{flex:1;height:5px;accent-color:var(--accent);margin:0 6px}
.p-row input[type=number]{width:50px;height:24px;border:1px solid var(--border);border-radius:4px;text-align:center;font-size:12px;padding:0}
.p-row select{font-size:12px;padding:3px;border:1px solid var(--border);border-radius:4px;width:100%;margin-top:5px}
.config .current-val{font-size:10px;color:var(--sub);margin-top:2px;padding:3px 6px;background:var(--bg);border-radius:4px;line-height:1.5}

/* Chart panel (right side of each row) */
.chart-panel{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden}
.chart-panel .tbar{padding:6px 10px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.chart-panel .tbar .dot{width:7px;height:7px;border-radius:50%}
.chart-panel .tbar .badge{font-weight:400;color:var(--sub);font-size:10px;margin-left:auto}
.chart-panel .plot{flex:1;min-height:0}

/* Bottom bar */
.bottom-bar{height:24px;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;font-size:10px;color:var(--sub);gap:16px;flex-shrink:0}
.bottom-bar .green{color:#27ae60}
.bottom-bar .orange{color:#e67e22}

/* Buttons */
.btn-row{display:flex;gap:5px;margin-top:4px}
.btn{flex:1;padding:5px 0;border:none;border-radius:4px;font-size:10px;cursor:pointer;transition:.15s}
.btn.primary{background:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(.9)}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--sub)}
.btn.outline:hover{background:var(--bg)}

/* Report section */
.rpt-section{margin:0 0 8px}
.rpt-tabs{display:flex;gap:0;margin-bottom:0}
.rpt-tab{padding:8px 18px;background:var(--bg);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;font-size:12px;cursor:pointer;transition:.15s;color:var(--sub)}
.rpt-tab.active{background:var(--card);color:var(--text);font-weight:600;box-shadow:0 -2px 6px rgba(0,0,0,.04)}
.rpt-panel{background:var(--card);border:1px solid var(--border);border-radius:0 8px 8px 8px;padding:14px 18px;display:none;font-size:13px;line-height:1.8}
.rpt-panel.active{display:block}
.rpt-panel h4{font-size:14px;margin:10px 0 6px;color:var(--text)}
.rpt-panel h4:first-child{margin-top:0}
.rpt-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.rpt-table td{padding:5px 10px;border-bottom:1px solid var(--border)}
.rpt-table td:first-child{color:var(--sub);width:80px;white-space:nowrap}
.rpt-table td:last-child{font-weight:500;color:var(--text)}
.rpt-signal{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:2px 4px}
.rpt-signal.bullish{background:#ffeaea;color:var(--up)}
.rpt-signal.bearish{background:#eafaf1;color:var(--down)}
.rpt-signal.neutral{background:#f0f0f0;color:var(--sub)}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal-box{background:var(--card);border-radius:12px;width:min(900px,95vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e8eaed}
.modal-body{flex:1;overflow-y:auto;padding:14px 18px;font-size:13px;line-height:1.8}
.modal-body h4{font-size:14px;margin:10px 0 6px;color:var(--text)}
.modal-body h4:first-child{margin-top:0}
.modal-body .rpt-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.modal-body .rpt-table td{padding:5px 10px;border-bottom:1px solid var(--border)}
.modal-body .rpt-table td:first-child{color:var(--sub);width:80px;white-space:nowrap}
.modal-body .rpt-table td:last-child{font-weight:500;color:var(--text)}
.modal-body .rpt-signal{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:2px 4px}
.modal-body .rpt-signal.bullish{background:#ffeaea;color:var(--up)}
.modal-body .rpt-signal.bearish{background:#eafaf1;color:var(--down)}
.modal-body .rpt-signal.neutral{background:#f0f0f0;color:var(--sub)}
.modal-tabs{display:flex;gap:0;margin-bottom:0;border-bottom:1px solid var(--border)}
.modal-tab{padding:8px 16px;background:transparent;border:none;border-bottom:2px solid transparent;font-size:12px;cursor:pointer;transition:.15s;color:var(--sub)}
.modal-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.modal-panels .modal-panel{display:none;padding:10px 4px}
.modal-panels .modal-panel.active{display:block}
.modal-stocks{display:flex;gap:6px;padding:8px 18px;background:var(--bg);flex-wrap:wrap}
.modal-sbtn{padding:3px 10px;border:1px solid var(--border);border-radius:5px;background:var(--card);cursor:pointer;font-size:11px;transition:.15s}
.modal-sbtn:hover{border-color:var(--accent);color:var(--accent)}
.modal-sbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">📊 <span>Indicator</span>Lab</div>
  <span class="sep">|</span>
  <span id="nav-file" class="tag">选择数据</span>
  <span id="nav-rows" style="font-size:11px"></span>
  <div class="stock-row" id="stockBtns"></div>
  <input type="file" id="fileInput" accept=".csv" style="display:none" onchange="handleFileUpload(event)">
  <div class="upload-top" onclick="document.getElementById('fileInput').click()" id="uploadBox">📁 上传CSV</div>
</div>

<!-- Stock info card -->
<div class="info-card" id="stockInfo" style="display:none">
  <div class="item">
    <span class="label">收盘价</span>
    <span class="val" id="infoPrice">--</span>
  </div>
  <div class="item">
    <span class="label">涨跌幅</span>
    <span class="val" id="infoChange">--</span>
  </div>
  <div class="item">
    <span class="label">数据范围</span>
    <span class="sub" id="infoRange">--</span>
  </div>
  <div class="item" style="margin-left:auto">
    <span class="label">总数据（前复权日线）</span>
    <span class="sub" id="infoCount">-- 条</span>
  </div>
</div>

<div class="main">

  <!-- Row 1: MACD -->
  <div class="ind-row">
    <div class="config">
      <div class="ch">
        <div class="hd" onclick="this.closest('.ch').classList.toggle('collapsed')">
          <div class="dot" style="background:var(--macd-c)"></div>MACD<span class="arrow">▼</span>
        </div>
        <div class="body">
          <div class="p-row"><label>快线</label><input type=range min=5 max=30 value=12 oninput="onParam('macd','fast',this.value)"><input type=number value=12 id=macdFast onchange="onParam('macd','fast',this.value)"></div>
          <div class="p-row"><label>慢线</label><input type=range min=10 max=50 value=26 oninput="onParam('macd','slow',this.value)"><input type=number value=26 id=macdSlow onchange="onParam('macd','slow',this.value)"></div>
          <div class="p-row"><label>信号</label><input type=range min=5 max=20 value=9 oninput="onParam('macd','sig',this.value)"><input type=number value=9 id=macdSig onchange="onParam('macd','sig',this.value)"></div>
          <div class="btn-row">
            <button class="btn outline" onclick="resetOne('macd')">默认</button>
          </div>
        </div>
      </div>
    </div>
    <div class="chart-panel">
      <div class="tbar"><div class="dot" style="background:var(--macd-c)"></div>MACD · 指数平滑异同均线<span class="badge" id=macdBadge></span></div>
      <div class="plot" id="chartMacd"></div>
    </div>
  </div>

  <!-- Row 2: RSI -->
  <div class="ind-row">
    <div class="config">
      <div class="ch">
        <div class="hd" onclick="this.closest('.ch').classList.toggle('collapsed')">
          <div class="dot" style="background:var(--rsi-c)"></div>RSI<span class="arrow">▼</span>
        </div>
        <div class="body">
          <div class="p-row"><label>周期</label><input type=range min=5 max=50 value=14 oninput="onParam('rsi','n',this.value)"><input type=number value=14 id=rsiN onchange="onParam('rsi','n',this.value)"></div>
          <div class="p-row"><label>超买</label><input type=range min=60 max=90 value=70 oninput="onParam('rsi','ob',this.value)"><input type=number value=70 id=rsiOb onchange="onParam('rsi','ob',this.value)"></div>
          <div class="p-row"><label>超卖</label><input type=range min=10 max=40 value=30 oninput="onParam('rsi','os',this.value)"><input type=number value=30 id=rsiOs onchange="onParam('rsi','os',this.value)"></div>
          <div class="btn-row">
            <button class="btn outline" onclick="resetOne('rsi')">默认</button>
          </div>
        </div>
      </div>
    </div>
    <div class="chart-panel">
      <div class="tbar"><div class="dot" style="background:var(--rsi-c)"></div>RSI · 相对强弱指标<span class="badge" id=rsiBadge></span></div>
      <div class="plot" id="chartRsi"></div>
    </div>
  </div>

  <!-- Row 3: BB -->
  <div class="ind-row">
    <div class="config">
      <div class="ch">
        <div class="hd" onclick="this.closest('.ch').classList.toggle('collapsed')">
          <div class="dot" style="background:var(--bb-c)"></div>布林带 BB<span class="arrow">▼</span>
        </div>
        <div class="body">
          <div class="p-row"><label>周期</label><input type=range min=5 max=50 value=20 oninput="onParam('bb','n',this.value)"><input type=number value=20 id=bbN onchange="onParam('bb','n',this.value)"></div>
          <div class="p-row"><label>σ</label><input type=range min=10 max=40 value=20 oninput="onParam('bb','k',this.value/10);this.nextElementSibling.textContent=(this.value/10).toFixed(1)"><span style="font-size:10px;margin-left:4px;color:var(--sub)">2.0</span></div>
          <div class="btn-row">
            <button class="btn outline" onclick="resetOne('bb')">默认</button>
          </div>
        </div>
      </div>
    </div>
    <div class="chart-panel">
      <div class="tbar"><div class="dot" style="background:var(--bb-c)"></div>布林带 BB · Bollinger Bands<span class="badge" id=bbBadge></span></div>
      <div class="plot" id="chartBb"></div>
    </div>
  </div>

  <!-- Row 4: ATR -->
  <div class="ind-row">
    <div class="config">
      <div class="ch">
        <div class="hd" onclick="this.closest('.ch').classList.toggle('collapsed')">
          <div class="dot" style="background:var(--atr-c)"></div>ATR<span class="arrow">▼</span>
        </div>
        <div class="body">
          <div class="p-row"><label>周期</label><input type=range min=5 max=50 value=14 oninput="onParam('atr','n',this.value)"><input type=number value=14 id=atrN onchange="onParam('atr','n',this.value)"></div>
          <select style="width:100%;margin-top:6px;font-size:10px;padding:3px;border:1px solid var(--border);border-radius:3px" onchange="onParam('atr','type',this.value)">
            <option value="pct">ATR %</option>
            <option value="abs">ATR 绝对值</option>
          </select>
          <div class="btn-row">
            <button class="btn outline" onclick="resetOne('atr')">默认</button>
          </div>
        </div>
      </div>
    </div>
    <div class="chart-panel">
      <div class="tbar"><div class="dot" style="background:var(--atr-c)"></div>ATR · 平均真实波幅<span class="badge" id=atrBadge></span></div>
      <div class="plot" id="chartAtr"></div>
    </div>
  </div>

</div>

<div class="bottom-bar" id="statusBar">
  <span id="statDate">等待加载数据...</span>
  <span id="statSignal"></span>
  <span style="margin-left:auto;font-size:10px">
    <button class="btn outline" style="padding:1px 8px;font-size:9px" onclick="openReport()">📋 分析报告</button>
    <button class="btn outline" style="padding:1px 8px;font-size:9px" onclick="resetAll()">🔄 全部默认</button>
    <button class="btn primary" style="padding:1px 8px;font-size:9px" onclick="exportPNG()">📷 导出</button>
  </span>
</div>

<!-- Report Modal -->
<div class="modal-overlay" id="rptOverlay" onclick="if(event.target===this)closeReport()">
  <div class="modal-box">
    <div class="modal-header">
      <span>📋 分析报告 — <span id="rptTitle">选择股票</span></span>
      <button class="modal-close" onclick="closeReport()">×</button>
    </div>
    <div class="modal-stocks" id="modalStocks"></div>
    <div class="modal-tabs">
      <div class="modal-tab active" onclick="switchRptTab('tech')">📈 技术指标分析</div>
      <div class="modal-tab" onclick="switchRptTab('fund')">🏢 基本面概况</div>
    </div>
    <div class="modal-panels modal-body">
      <div class="modal-panel active" id="rptTechModal"></div>
      <div class="modal-panel" id="rptFundModal"></div>
    </div>
  </div>
</div>

function calcBB(c,n,k){const m=sma(c,n),s=stdv(c,n,m);return{mid:m,upper:m.map((v,i)=>(v!=null&&s[i]!=null)?v+k*s[i]:null),lower:m.map((v,i)=>(v!=null&&s[i]!=null)?v-k*s[i]:null)}}
function calcRSI(c,n){const r=new Array(c.length).fill(null);let ag=0,al=0;for(let i=1;i<=n;i++){const d=c[i]-c[i-1];if(d>0)ag+=d;else al-=d}r[n]=100-100/(1+ag/(al||1e-4));for(let i=n+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(n-1)+(d>0?d:0))/n;al=(al*(n-1)+(d<0?-d:0))/n;r[i]=100-100/(1+ag/(al||1e-4))}return r}
function calcATR(h,l,c,n){const tr=[0];for(let i=1;i<c.length;i++)tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));const a=sma(tr,n);return{tr,atr:a,atrPct:a.map((v,i)=>(v!=null)?v/c[i]*100:null)}}

const BL=m=>({margin:{t:22,l:38,r:10,b:32},plot_bgcolor:'#fff',paper_bgcolor:'#fff',xaxis:{gridcolor:'#f0f0f0',showticklabels:true,tickfont:{size:8},tickangle:30,nticks:6},yaxis:{gridcolor:'#f0f0f0'},showlegend:false,height:m||260,font:{family:'Microsoft YaHei, sans-serif',size:9},dragmode:'pan'});

function renderMACD(d,p){
  const{dif,dea,hist}=calcMACD(d.close,p.fast,p.slow,p.sig);
  const hc=hist.map((h,i)=>{if(h==null)return'#ccc';if(i===0)return h>=0?'#e74c3c':'#27ae60';return h>=hist[i-1]?'#e74c3c':'#27ae60'});
  const ly={...BL(240),yaxis2:{overlaying:'y',side:'right',gridcolor:'#f0f0f0'},shapes:[{type:'line',x0:0,x1:1,xref:'paper',y0:0,y1:0,yref:'y2',line:{dash:'dash',color:'#aaa'}}]};
  const tr=[{x:d.dates,y:d.close,type:'scatter',mode:'lines',line:{color:'#333',width:1},yaxis:'y'},{x:d.dates,y:dif,type:'scatter',mode:'lines',line:{color:'#3498db',width:1.1},yaxis:'y2'},{x:d.dates,y:dea,type:'scatter',mode:'lines',line:{color:'#f39c12',width:1.1},yaxis:'y2'},{x:d.dates,y:hist,type:'bar',marker:{color:hc},yaxis:'y2',opacity:.5}];
  for(let i=1;i<dif.length;i++){if(dif[i]!=null&&dea[i]!=null&&dif[i-1]!=null&&dea[i-1]!=null){if(dif[i-1]<=dea[i-1]&&dif[i]>dea[i])tr.push({x:[d.dates[i]],y:[d.close[i]],type:'scatter',mode:'markers+text',marker:{color:'#e74c3c',symbol:'triangle-up',size:8},text:['金叉'],textposition:'top center',textfont:{size:7,color:'#e74c3c'},yaxis:'y',showlegend:false});else if(dif[i-1]>=dea[i-1]&&dif[i]<dea[i])tr.push({x:[d.dates[i]],y:[d.close[i]],type:'scatter',mode:'markers+text',marker:{color:'#27ae60',symbol:'triangle-down',size:8},text:['死叉'],textposition:'bottom center',textfont:{size:7,color:'#27ae60'},yaxis:'y',showlegend:false});}}
  Plotly.react('chartMacd',tr,ly,{displayModeBar:false});
  document.getElementById('macdBadge').textContent=`快${p.fast}·慢${p.slow}·信${p.sig}`;
}
function renderBB(d,p){const{mid,upper,lower}=calcBB(d.close,p.n,p.k);Plotly.react('chartBb',[{x:d.dates,open:d.open,high:d.high,low:d.low,close:d.close,type:'candlestick',increasing:{line:{color:'#e74c3c'},fillcolor:'#e74c3c'},decreasing:{line:{color:'#27ae60'},fillcolor:'#27ae60'}},{x:d.dates,y:upper,type:'scatter',mode:'lines',line:{color:'#e74c3c',dash:'dash',width:.8}},{x:d.dates,y:mid,type:'scatter',mode:'lines',line:{color:'#3498db',width:1.2}},{x:d.dates,y:lower,type:'scatter',mode:'lines',line:{color:'#27ae60',dash:'dash',width:.8},fill:'tonexty',fillcolor:'rgba(155,89,182,.05)'}],BL(240),{displayModeBar:false});document.getElementById('bbBadge').textContent=`${p.n}日·${p.k.toFixed(1)}σ`;}
function renderRSI(d,p){const rsi=calcRSI(d.close,p.n);const ly={...BL(240),yaxis:{gridcolor:'#f0f0f0',range:[0,100]},shapes:[{type:'rect',x0:0,x1:1,xref:'paper',y0:p.ob,y1:100,yref:'y',fillcolor:'rgba(231,76,60,.06)',line:{width:0}},{type:'rect',x0:0,x1:1,xref:'paper',y0:0,y1:p.os,yref:'y',fillcolor:'rgba(39,174,96,.06)',line:{width:0}},{type:'line',x0:0,x1:1,xref:'paper',y0:p.ob,y1:p.ob,yref:'y',line:{dash:'dash',color:'#e74c3c',width:.7}},{type:'line',x0:0,x1:1,xref:'paper',y0:p.os,y1:p.os,yref:'y',line:{dash:'dash',color:'#27ae60',width:.7}}],annotations:[{x:.02,y:p.ob+7,xref:'paper',yref:'y',text:'超买',showarrow:false,font:{size:8,color:'#e74c3c'}},{x:.02,y:p.os-7,xref:'paper',yref:'y',text:'超卖',showarrow:false,font:{size:8,color:'#27ae60'}}]};Plotly.react('chartRsi',[{x:d.dates,y:rsi,type:'scatter',mode:'lines',line:{color:'#e67e22',width:1.4}}],ly,{displayModeBar:false});document.getElementById('rsiBadge').textContent=`${p.n}日·超${p.ob}/${p.os}`;}
function renderATR(d,p){const{atr,atrPct}=calcATR(d.high,d.low,d.close,p.n);Plotly.react('chartAtr',[{x:d.dates,y:p.type==='pct'?atrPct:atr,type:'scatter',mode:'lines',line:{color:'#27ae60',width:1.4},fill:'tozeroy',fillcolor:'rgba(39,174,96,.06)'}],{...BL(240),yaxis:{gridcolor:'#f0f0f0',title:{text:p.type==='pct'?'ATR %':'ATR',font:{size:8}}}},{displayModeBar:false});document.getElementById('atrBadge').textContent=`${p.n}日·${p.type==='pct'?'ATR%':'ATR'}`;}

function countSignals(d){const{dif,dea}=calcMACD(d.close,params.macd.fast,params.macd.slow,params.macd.sig);const rsi=calcRSI(d.close,params.rsi.n);let gc=0,dc=0,ob=0,os=0;for(let i=1;i<dif.length;i++){if(dif[i]!=null&&dea[i]!=null&&dif[i-1]!=null&&dea[i-1]!=null){if(dif[i-1]<=dea[i-1]&&dif[i]>dea[i])gc++;if(dif[i-1]>=dea[i-1]&&dif[i]<dea[i])dc++;}if(rsi[i]!=null){if(rsi[i]>params.rsi.ob)ob++;if(rsi[i]<params.rsi.os)os++;}}return{gc,dc,ob,os};}

function updateStockInfo(d){
  const lastClose=d.close[d.close.length-1];
  const prevClose=d.close[d.close.length-2];
  const change=lastClose-prevClose;
  const pct=change/prevClose*100;
  const elPrice=document.getElementById('infoPrice');
  const elChange=document.getElementById('infoChange');
  elPrice.textContent=`${lastClose.toFixed(2)}`;
  elPrice.className=`val ${pct>=0?'up':'down'}`;
  elChange.textContent=`${change>=0?'+':''}${change.toFixed(2)} (${pct>=0?'+':''}${pct.toFixed(2)}%)`;
  elChange.className=`val ${pct>=0?'up':'down'}`;
  document.getElementById('infoRange').textContent=`${d.dates[0]} ~ ${d.dates[d.dates.length-1]}`;
  document.getElementById('infoCount').textContent=`${d.dates.length} 条`;
  document.getElementById('stockInfo').style.display='flex';
}

function renderAll(){if(!currentData)return;const d=currentData;updateStockInfo(d);renderMACD(d,params.macd);renderRSI(d,params.rsi);renderBB(d,params.bb);renderATR(d,params.atr);const{gc,dc,ob,os}=countSignals(d);document.getElementById('statDate').textContent=`${d.name||d.code} · ${d.dates.length}条 · ${d.dates[0]} ~ ${d.dates[d.dates.length-1]}`;document.getElementById('statSignal').innerHTML=`<span class="green">金叉${gc}次</span> <span class="orange">死叉${dc}次</span> <span class="green">超买${ob}次</span> <span class="orange">超卖${os}次</span>`;}

function parseEmbedded(raw){const ps=raw.split(';'),dt=[],op=[],hi=[],lo=[],cl=[],vo=[];for(const p of ps){const[a,o,h,l,c,v]=p.split(',');dt.push(a.slice(0,4)+'-'+a.slice(4,6)+'-'+a.slice(6));op.push(+o);hi.push(+h);lo.push(+l);cl.push(+c);vo.push(+v);}return{dates:dt,open:op,high:hi,low:lo,close:cl,vol:vo};}
function loadEmbedded(code){const info=EMBEDDED_DATA[code];if(!info)return;currentData={...parseEmbedded(info.data),name:info.name,code};document.querySelectorAll('.stock-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');document.getElementById('uploadBox').classList.remove('loaded');document.getElementById('nav-file').textContent=`${code} ${info.name}`;document.getElementById('nav-rows').textContent=`${currentData.dates.length}条`;renderAll();}
function handleFileUpload(evt){const f=evt.target.files[0];if(f)parseCSV(f);}
function parseCSV(file){const r=new FileReader();r.onload=e=>{const ls=e.target.result.trim().split('\n'),hdr=ls[0].toLowerCase().split(',');const di=hdr.findIndex(c=>c.includes('trade_date')||c.includes('date')),oi=hdr.findIndex(c=>c.includes('open')),hi=hdr.findIndex(c=>c.includes('high')),li=hdr.findIndex(c=>c.includes('low')),ci=hdr.findIndex(c=>c.includes('close')),vi=hdr.findIndex(c=>c.includes('vol'));if(di<0||ci<0){alert('CSV格式错误：缺少日期或收盘价列');return}const dt=[],op=[],hl=[],lo=[],cl=[],vo=[];for(let i=1;i<ls.length;i++){const vs=ls[i].split(',');if(vs.length<Math.max(di,ci)+1)continue;dt.push(vs[di].trim().replace(/^(\d{4})(\d{2})(\d{2})$/,'$1-$2-$3'));cl.push(+vs[ci]);op.push(oi>=0?+vs[oi]:+vs[ci]);hl.push(hi>=0?+vs[hi]:+vs[ci]);lo.push(li>=0?+vs[li]:+vs[ci]);vo.push(vi>=0?+vs[vi]:0);}currentData={dates:dt,open:op,high:hl,low:lo,close:cl,vol:vo,name:file.name.replace('.csv',''),code:'FILE'};document.querySelectorAll('.stock-btn').forEach(b=>b.classList.remove('active'));document.getElementById('uploadBox').classList.add('loaded');document.getElementById('nav-file').textContent=`📄 ${file.name}`;document.getElementById('nav-rows').textContent=`${dt.length}条`;renderAll();};r.readAsText(file);}

let rt=null;
function onParam(cat,key,val){params[cat][key]=+val||val;const m={'macd.fast':['macdFast'],'macd.slow':['macdSlow'],'macd.sig':['macdSig'],'bb.n':['bbN'],'rsi.n':['rsiN'],'rsi.ob':['rsiOb'],'rsi.os':['rsiOs'],'atr.n':['atrN']};const id=m[`${cat}.${key}`];if(id){const el=document.getElementById(id[0]);if(el)el.value=val;}if(rt)clearTimeout(rt);rt=setTimeout(renderAll,250);}

function resetOne(type){
  params[type]=JSON.parse(JSON.stringify(defaults[type]));
  const m={macd:[['macdFast',12],['macdSlow',26],['macdSig',9]],bb:[['bbN',20]],rsi:[['rsiN',14],['rsiOb',70],['rsiOs',30]],atr:[['atrN',14]]};
  for(const[id,v]of m[type]){const el=document.getElementById(id);if(el)el.value=v;}
  if(type==='bb'){const r=document.querySelector('.ind-row:nth-child(3) input[type=range]');if(r&&r.value!=20)r.value=20;const s=r?r.nextElementSibling:null;if(s)s.textContent='2.0';params.bb.k=2;}
  if(type==='atr'){const s=document.querySelector('.ind-row:nth-child(4) select');if(s)s.value='pct';params.atr.type='pct';}
  renderAll();
}
function resetAll(){['macd','rsi','bb','atr'].forEach(resetOne);}
function exportPNG(){['chartMacd','chartRsi','chartBb','chartAtr'].forEach(id=>Plotly.downloadImage(id,{format:'png',width:1000,height:350,filename:`indicator_${id.replace('chart','')}`}));setTimeout(()=>alert('4张图表已下载'),300);}

// ===== Report Modal =====
let rptData=null;

function openReport(){
  if(!currentData){alert('请先加载数据');return}
  rptData=currentData;
  buildRptBtns();
  updateRptAll();
  document.getElementById('rptOverlay').classList.add('active');
  document.getElementById('rptTitle').textContent=(currentData.name||'')+' ('+currentData.code+')';
}

function closeReport(){
  document.getElementById('rptOverlay').classList.remove('active');
}

function buildRptBtns(){
  const el=document.getElementById('modalStocks');
  el.innerHTML='';
  for(const[code,info]of Object.entries(EMBEDDED_DATA)){
    const btn=document.createElement('button');
    btn.className='modal-sbtn';
    if(code===currentData.code)btn.classList.add('active');
    btn.textContent=`${code} ${info.name}`;
    btn.onclick=()=>switchRptStock(code);
    el.appendChild(btn);
  }
}

function switchRptStock(code){
  const info=EMBEDDED_DATA[code];if(!info)return;
  rptData={...parseEmbedded(info.data),name:info.name,code};
  document.querySelectorAll('.modal-sbtn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('rptTitle').textContent=info.name+' ('+code+')';
  updateRptAll();
}

function updateRptAll(){
  if(!rptData||!rptData.dates.length)return;
  updateTechReport();
  updateFundReport();
}

function switchRptTab(tab){
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.modal-panel').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab==='tech'?'rptTechModal':'rptFundModal').classList.add('active');
}

function updateReport(){
  updateRptAll();
}

function updateTechReport(){
  const d=rptData||currentData,el=document.getElementById('rptTechModal');
  if(!el)return;
  const c=d.close,n=d.close.length;
  const last=c[n-1],first=c[0],cRet=((last/first-1)*100).toFixed(2);
  const rets=[];for(let i=1;i<n;i++)rets.push((c[i]-c[i-1])/c[i-1]*100);
  const avgRet=(rets.reduce((a,b)=>a+b,0)/rets.length).toFixed(3);
  const maxUp=Math.max(...rets).toFixed(2),maxDn=Math.min(...rets).toFixed(2);
  const avg=parseFloat((c.reduce((a,b)=>a+b,0)/n).toFixed(2));
  const v=Math.sqrt(c.reduce((a,x)=>a+(x-avg)**2,0)/n).toFixed(2);

  const rsi=calcRSI(c,params.rsi.n),lastRsi=parseFloat(rsi[rsi.length-1]||50).toFixed(1);
  const m=calcMACD(c,params.macd.fast,params.macd.slow,params.macd.sig);
  const lastDif=parseFloat(m.dif[m.dif.length-1]||0).toFixed(3),lastDea=parseFloat(m.dea[m.dea.length-1]||0).toFixed(3),lastHist=parseFloat(m.hist[m.hist.length-1]||0).toFixed(3);
  let macdSignal='金叉看涨',macdCls='bullish';
  if(lastDif<lastDea){macdSignal='死叉看跌';macdCls='bearish';}else if(Math.abs(lastDif-lastDea)<0.01){macdSignal='粘合待变';macdCls='neutral';}
  else if(lastHist<0){macdSignal='红柱缩短';macdCls='neutral';}

  let gold=0,dead=0;
  for(let i=1;i<m.dif.length;i++){
    if(m.dif[i-1]!=null&&m.dea[i-1]!=null&&m.dif[i]!=null&&m.dea[i]!=null){
      if(m.dif[i-1]<=m.dea[i-1]&&m.dif[i]>m.dea[i])gold++;
      if(m.dif[i-1]>=m.dea[i-1]&&m.dif[i]<m.dea[i])dead++;
    }
  }

  let rsiState='中性区',rsiCls='neutral';
  if(lastRsi>70){rsiState='超买区';rsiCls='bullish';}else if(lastRsi<30){rsiState='超卖区';rsiCls='bearish';}else if(lastRsi>50){rsiState='偏强区';}

  const bb=calcBB(c,params.bb.n,params.bb.k);
  const bbW=parseFloat(bb.upper[bb.upper.length-1]-bb.lower[bb.lower.length-1]).toFixed(2);
  const bbM=parseFloat(bb.mid[bb.mid.length-1]).toFixed(2),bbRate=parseFloat(bbW/bbM*100).toFixed(2);
  let bbPos='中轨附近';if(last>bb.upper[bb.upper.length-1])bbPos='突破上轨';else if(last<bb.lower[bb.lower.length-1])bbPos='跌破下轨';

  const atrObj=calcATR(d.high,d.low,c,params.atr.n);
  const atrArr=atrObj.atr,lastAtr=parseFloat(atrArr[atrArr.length-1]||0).toFixed(2),avgAtr=parseFloat(atrArr.filter(v=>v!=null).reduce((a,b)=>a+b,0)/atrArr.filter(v=>v!=null).length).toFixed(2);

  el.innerHTML=`<h4>📊 数据概览</h4>
    <table class="rpt-table">
      <tr><td>股票名称</td><td>${d.name||''} (${d.code||''})</td></tr>
      <tr><td>数据范围</td><td>${d.dates[0]} ~ ${d.dates[d.dates.length-1]}</td></tr>
      <tr><td>交易日数</td><td>${n} 条</td></tr>
      <tr><td>收盘均价</td><td>¥${avg}</td></tr>
      <tr><td>最新收盘</td><td>¥${last.toFixed(2)}</td></tr>
      <tr><td>标准差</td><td>¥${v}</td></tr>
      <tr><td>区间收益率</td><td style="color:${cRet>=0?'var(--up)':'var(--down)'}">${cRet>=0?'+':''}${cRet}%</td></tr>
      <tr><td>日均收益率</td><td>${avgRet>=0?'+':''}${avgRet}%</td></tr>
      <tr><td>最大单日涨幅</td><td style="color:var(--up)">+${maxUp}%</td></tr>
      <tr><td>最大单日跌幅</td><td style="color:var(--down)">${maxDn}%</td></tr>
    </table>
    <h4>🎯 指标综合诊断</h4>
    <table class="rpt-table">
      <tr><td>MACD</td><td>DIF=${lastDif} DEA=${lastDea} MACD柱=${lastHist} <span class="rpt-signal ${macdCls}">${macdSignal}</span> 金叉${gold}次/死叉${dead}次</td></tr>
      <tr><td>RSI(${params.rsi.n})</td><td>${lastRsi} <span class="rpt-signal ${rsiCls}">${rsiState}</span></td></tr>
      <tr><td>布林带(${params.bb.n},${params.bb.k})</td><td>上¥${bb.upper[bb.upper.length-1].toFixed(2)} 中¥${bbM} 下¥${bb.lower[bb.lower.length-1].toFixed(2)} 带宽${bbRate}% 位置:${bbPos}</td></tr>
      <tr><td>ATR(${params.atr.n})</td><td>最新${lastAtr}元 均值${avgAtr}元</td></tr>
    </table>
    <h4>💡 综合解读</h4>
    <p style="margin-bottom:6px">${d.name||''}在近${Math.ceil(n/242*12)}个月中，股价${cRet>=0?'上涨':'下跌'}${Math.abs(parseFloat(cRet))}%。当前MACD指标${macdCls==='bullish'?'处于多头趋势':'处于空头趋势'}，RSI位于${rsiState}，布林带带宽率${bbRate}%反映市场${parseFloat(bbRate)>20?'波动较大':'波动适中'}。技术面综合判断：${macdCls==='bullish'&&rsiCls!=='bearish'?'偏多':'偏空'}，建议结合基本面和市场环境综合决策。</p>
    <p style="font-size:11px;color:var(--sub)">⚠ 以上为基于历史数据的量化指标分析，不构成投资建议。</p>`;
}

function updateFundReport(){
  const el=document.getElementById('rptFundModal');
  const d=rptData||currentData;
  if(!el||!d||!d.code)return;
  const f=_FUND[d.code];
  if(!f){el.innerHTML='<p style="color:var(--sub)">暂无该股票的基本面数据</p>';return;}
  el.innerHTML=`<h4>🏢 公司简介</h4><p>${f.desc||'暂无'}</p>
    <h4>📋 基本信息</h4>
    <table class="rpt-table">
      <tr><td>所属行业</td><td>${f.industry||'--'}</td></tr>
      <tr><td>上市市场</td><td>${f.market||'--'}</td></tr>
      <tr><td>上市日期</td><td>${f.list_date||'--'}</td></tr>
      <tr><td>员工人数</td><td>${f.employees||'--'}人</td></tr>
    </table>
    <h4>💰 估值指标</h4>
    <table class="rpt-table">
      <tr><td>静态PE(市盈率)</td><td>${f.pe||'--'}</td></tr>
      <tr><td>PE TTM(滚动)</td><td>${f.pe_ttm||'--'}</td></tr>
      <tr><td>PB(市净率)</td><td>${f.pb||'--'}</td></tr>
      <tr><td>总市值</td><td>${f.mv||'--'}</td></tr>
    </table>
    <h4>📊 估值解读</h4>
    <p style="margin-bottom:6px">当前PE TTM为${f.pe_ttm||'--'}倍，${parseFloat(f.pe_ttm)>50?'处于较高估值区间，市场给予较高的成长性溢价。':'处于相对合理区间。'}PB为${f.pb||'--'}倍，${parseFloat(f.pb)>5?'高于面值数倍，反映较强的品牌或无形价值。':'处于较低估值区间。'}总市值约${f.mv||'--'}，在所属${f.industry||'--'}行业中${parseFloat(f.mv)>1000?'位居前列。':'具有一定规模。'}</p>
    <p style="font-size:11px;color:var(--sub)">⚠ 估值数据来源：tushare/公开市场数据，仅供参考，不构成投资建议。</p>`;
}

// Sync rptData when main page stock changes
const _origLoadEmbedded=loadEmbedded;
loadEmbedded=function(code){
  _origLoadEmbedded(code);
  rptData=currentData;
};
</script>
